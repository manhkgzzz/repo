<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Cá Nhân - 2027</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b1120;
            --card-bg: #111827;
            --card-hover: #1e293b;
            --border: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0b1120 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
            font-weight: 800;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: 0.2s;
            font-family: inherit;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }
        
        .form-group input[type="file"] {
            padding: 9px;
            border: 1px dashed var(--border);
            cursor: pointer;
            background: var(--card-hover);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #1557b0;
            transform: translateY(-2px);
        }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-back:hover {
            color: var(--text-main);
        }

        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto 25px;
            border: 3px solid var(--primary);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Hồ Sơ Cá Nhân</h2>
        
        <!-- Hiển thị Avatar hiện tại, nếu lỗi file do ngài xóa thư mục upload thì sẽ tải ảnh mặc định (nếu có) -->
        <img src="{{ url_for('static', filename='uploads/' + current_user.avatar) }}" class="avatar-preview" alt="Avatar">
        
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Đổi Ảnh Đại Diện (Tùy chọn)</label>
                <input type="file" name="avatar" accept="image/*">
            </div>
            <div class="form-group">
                <label>Họ và Tên</label>
                <input type="text" name="username" value="{{ current_user.username }}" required>
            </div>
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" name="phone" value="{{ current_user.phone }}" required>
            </div>
            <div class="form-group">
                <label>Link Facebook (Để trao đổi bài)</label>
                <input type="text" name="fb_link" value="{{ current_user.fb_link or '' }}" placeholder="https://facebook.com/...">
            </div>
            <button type="submit" class="btn">💾 Lưu Thay Đổi</button>
            <a href="/" class="btn-back">⬅ Quay lại Tổng Hành Dinh</a>
        </form>
    </div>
</body>
</html>
