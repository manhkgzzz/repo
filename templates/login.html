<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - Hệ Thống Thủ Khoa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box;}
        .auth-card h2 { text-align: center; color: #1a73e8; margin-top: 0; margin-bottom: 30px; font-weight: 800; font-size: 28px;}
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; transition: 0.3s; }
        .form-group input:focus { border-color: #1a73e8; }
        .btn { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #1557b0; }
        .text-center { text-align: center; margin-top: 20px; font-size: 14px; color: #666;}
        .text-center a { color: #1a73e8; text-decoration: none; font-weight: bold; }
        
        /* Hiệu ứng Toast Notification cho trang Login */
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: #fff; border-left: 5px solid #ea4335; box-shadow: 0 4px 15px rgba(0,0,0,0.2); padding: 15px 20px; border-radius: 8px; font-weight: bold; animation: slideIn 0.3s ease forwards; color: #333; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    </style>
</head>
<body>
    <!-- Kênh hiện thông báo lỗi (Sai pass/email) -->
    <div class="toast-container">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="toast">⚠️ {{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
    </div>

    <div class="auth-card">
        <h2>ĐĂNG NHẬP</h2>
        <form method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="Nhập email của bạn">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" required placeholder="Nhập mật khẩu">
            </div>
            <button type="submit" class="btn">Vào Hệ Thống</button>
        </form>
        <div class="text-center">
            Chưa có tài khoản? <a href="/register">Đăng ký ngay</a><br><br>
            <a href="/" style="color: #666;">⬅ Trở lại Tổng Hành Dinh</a>
        </div>
    </div>
    
    <script>
        // Tự động tắt cảnh báo sau 5 giây
        setTimeout(() => {
            document.querySelectorAll('.toast').forEach(t => {
                t.style.animation = 'fadeOut 0.5s forwards';
                setTimeout(() => t.remove(), 500);
            });
        }, 5000);
    </script>
</body>
</html>
